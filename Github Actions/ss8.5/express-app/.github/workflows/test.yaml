name: Test Project

on: push

jobs:
    test:
        runs-on: ubuntu-latest

        env:
            NODE_ENV: TEST
            PORT: "3000"
            MONGO_USER: testuser
            MONGO_PASS: testpass
            MONGO_HOST: localhost:27017

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                ref: main
                # ref: dev
            - name: Install dependencies
              run: npm ci
            - name: Run tests
              run: npm test
