name: Build & Upload Artifact

on:
  push:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache node_modules
        id: cache-nm
        uses: actions/cache@v4
        with:
          # Strategy B: cache the installed node_modules itself, not the npm download dir.
          # On a cache hit we skip `npm ci` entirely (see the if: below).
          path: node_modules
          # Key on lockfile hash so a dependency change busts the cache automatically.
          key: ${{ runner.os }}-node22-nodemodules-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies
        # Only install when the cache missed. On a hit, node_modules is already restored.
        if: steps.cache-nm.outputs.cache-hit != 'true'
        run: npm ci

      - name: Lint
        run: npm run lint

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache node_modules
        id: cache-nm
        uses: actions/cache@v4
        with:
          # Strategy B: cache the installed node_modules itself, not the npm download dir.
          # On a cache hit we skip `npm ci` entirely (see the if: below).
          path: node_modules
          # Key on lockfile hash so a dependency change busts the cache automatically.
          key: ${{ runner.os }}-node22-nodemodules-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies
        # Only install when the cache missed. On a hit, node_modules is already restored.
        if: steps.cache-nm.outputs.cache-hit != 'true'
        run: npm ci

      - name: Test
        run: npm test

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    outputs:
      script-file: ${{ steps.publish.outputs.script-file }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache node_modules
        id: cache-nm
        uses: actions/cache@v4
        with:
          # Strategy B: cache the installed node_modules itself, not the npm download dir.
          # On a cache hit we skip `npm ci` entirely (see the if: below).
          path: node_modules
          # Key on lockfile hash so a dependency change busts the cache automatically.
          key: ${{ runner.os }}-node22-nodemodules-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies
        # Only install when the cache missed. On a hit, node_modules is already restored.
        if: steps.cache-nm.outputs.cache-hit != 'true'
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Publish JS filename
        id: publish
        run: echo "script-file=$(find dist/assets -name '*.js')" >> $GITHUB_OUTPUT

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-build
          path: |
            dist/
            package.json
          retention-days: 7 

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: site-build

      - name: Show built file name
        run: |
          echo "Built JS file: ${{ needs.build.outputs.script-file }}"

      - name: List files
        run: ls -la

      - name: Deploy
        run: |
          echo "Deploying ${{ needs.build.outputs.script-file }}"