apiVersion: certificates.k8s.io/v1
kind: CertificateSigningRequest # This resource represents a request for a certificate. It is used to request a certificate from the Kubernetes API server.
metadata:
  name: alice
spec:
  # The CSR is a base64-encoded PKCS#10 certificate signing request. It should be PEM-encoded and then base64-encoded.
  request: 
  signerName: kubernetes.io/kube-apiserver-client # Use the built-in signer for kube-apiserver client certificates
  expirationSeconds: 86400 # 1 day
  usages:
  - client auth
---
